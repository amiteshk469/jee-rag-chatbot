version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - CHROMA_PATH=/app/data/chroma_index
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    restart: unless-stopped
