name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Backend Tests & Lint ---
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy main.py --ignore-missing-imports || true

      - name: Test ingestion (no API key needed)
        run: python ingestion/ingest.py
        env:
          OPENAI_API_KEY: "test-key-not-used"

  # --- Frontend Build ---
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com

  # --- Deploy Backend (on push to main only) ---
  deploy-backend:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          echo "🚀 Backend deployment triggered"
          echo "Configure Render deploy hook URL in repository secrets"
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # --- Deploy Frontend (on push to main only) ---
  deploy-frontend:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          echo "🚀 Frontend deployment triggered"
          echo "Vercel auto-deploys from GitHub — no manual step needed"
          # npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
